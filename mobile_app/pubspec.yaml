name: family_kitchen
description: "Kitchen management platform for solo/family households - The Royal Hearth."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  http: ^1.1.0
  dio: ^5.3.0
  sqflite: ^2.2.6
  connectivity_plus: ^5.0.0
  image_picker: ^1.0.0
  camera: ^0.10.5
  google_ml_kit: ^0.13.0
  shared_preferences: ^2.2.0
  jwt_decoder: ^2.0.1
  crypto: ^3.0.2
  intl: ^0.19.0
  uuid: ^4.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  workmanager: ^0.5.1
  firebase_core: ^2.24.0
  firebase_messaging: ^14.6.0
  google_fonts: ^6.1.0
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
msix_config:
  windows_package_name: "FamilyKitchen"
