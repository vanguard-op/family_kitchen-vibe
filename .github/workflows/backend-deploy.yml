name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
      
      - name: Configure Docker
        run: |
          gcloud auth configure-docker gcr.io
      
      - name: Build Docker image
        working-directory: ./api
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/family-kitchen-api:${{ github.sha }} .
          docker tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/family-kitchen-api:${{ github.sha }} gcr.io/${{ secrets.GCP_PROJECT_ID }}/family-kitchen-api:latest
      
      - name: Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/family-kitchen-api:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/family-kitchen-api:latest
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy family-kitchen-api-prod \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/family-kitchen-api:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated
